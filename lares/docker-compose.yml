services:
  app_proxy:
    environment:
      APP_HOST: lares_web_1
      APP_PORT: 8000

  web:
    image: xdeekay/lares:0.1.0@sha256:11c0649e34c9e1a3ead1ce801cf379e5ae9b25aa0a2e15e2c4fe717b59c41816
    restart: unless-stopped
    volumes:
      - ${APP_DATA_DIR}/data:/app/backend/data
      - /var/run/docker.sock:/var/run/docker.sock
      - /etc/localtime:/etc/localtime:ro
      # Host root + /proc, read-only, so the disk collector can see the
      # host's real mount table instead of just this container's own
      # isolated filesystem. See backend/collectors/disk.py's docstring.
      - /:/host:ro
      - /proc:/host/proc:ro
